syntax = "proto3";

package users.v1;

option go_package = "github.com/yourusername/mtg-proto/gen/proto/users/v1;usersv1";

import "google/protobuf/timestamp.proto";

// UserService is used internally by the API gateway and other services
// to validate tokens and look up user identity without going through HTTP.
service UserService {
  rpc GetUser(GetUserRequest)           returns (GetUserResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message User {
  string uuid         = 1;
  string email        = 2;
  string display_name = 3;
  string role         = 4; // user | admin
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool   valid   = 1;
  string user_id = 2;
  string role    = 3;
  google.protobuf.Timestamp expires_at = 4;
}